<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Axcel Classes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #0b132b; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; user-select: none; padding: 10px; }
        .auth-container { width: 100%; max-width: 360px; padding: 24px 22px; background: #1c2541; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 25px rgba(0,0,0,0.4); text-align: center; }
        .small-logo-box { margin-bottom: 12px; }
        .small-logo-img { width: 70px; height: 70px; object-fit: contain; filter: drop-shadow(0 0 6px rgba(0, 180, 216, 0.4)); }
        h2 { color: #fff; margin-bottom: 18px; font-size: 20px; font-weight: 700; }
        
        .google-btn { width: 100%; padding: 12px; background: #ffffff; color: #1f1f1f; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; display: flex; justify-content: center; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 20px; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .google-icon-svg { width: 18px; height: 18px; }
        .or-divider { display: flex; align-items: center; text-align: center; margin-bottom: 18px; color: #a5a5a5; font-size: 13px; }
        .or-divider::before, .or-divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .or-divider:not(:empty)::before { margin-right: .5em; }
        .or-divider:not(:empty)::after { margin-left: .5em; }

        .input-group { position: relative; margin-bottom: 14px; }
        .input-group i { position: absolute; left: 14px; top: 13px; color: #00b4d8; font-size: 15px; }
        .input-group input { width: 100%; padding: 12px 12px 12px 40px; background: #0b132b; border: 1px solid rgba(255,255,255,0.08); color: #fff; border-radius: 8px; font-size: 14px; outline: none; transition: 0.2s; }
        .btn-primary { width: 100%; padding: 12px; background: linear-gradient(90deg, #00b4d8, #0077b6); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(0, 180, 216, 0.3); }
        .switch-text { text-align: center; margin-top: 20px; color: #a5a5a5; font-size: 13px; }
        .switch-text span { color: #00b4d8; font-weight: bold; cursor: pointer; text-decoration: underline; }

        /* नीचे से खुलने वाली गूगल अकाउंट शीट */
        .g-sheet-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); z-index: 9999; justify-content: center; align-items: flex-end; }
        .g-sheet { width: 100%; max-width: 400px; background: #fff; color: #202124; padding: 24px; border-radius: 16px 16px 0 0; text-align: left; box-shadow: 0 -4px 20px rgba(0,0,0,0.3); animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .g-sheet-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .g-input { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 6px; margin-bottom: 15px; font-size: 14px; outline: none; color: #202124; }
        .g-sheet-btn { width: 100%; padding: 12px; background: #1a73e8; color: #fff; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px; text-align: center; }

        /* ईमेल ओटीपी स्क्रीन स्टाइल (गूगल शीट के अंदर ही दिखेगा) */
        .g-otp-section { display: none; }
        .g-otp-input { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 6px; text-align: center; font-size: 20px; letter-spacing: 10px; margin-bottom: 15px; outline: none; color: #202124; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="small-logo-box">
            <img src="https://i.postimg.cc/y8BKshn6/file-00000000fa1071f880f8503b182f9af3.png" alt="Logo" class="small-logo-img">
        </div>
        <h2>साइन इन (Sign In)</h2>
        
        <button class="google-btn" onclick="openGoogleSheet()">
            <svg class="google-icon-svg" viewBox="0 0 24 24">
                <path fill="#EA4335" d="M5.266 9.765A7.077 7.077 0 0 1 12 4.909c1.69 0 3.218.6 4.418 1.582L19.91 3C17.782 1.145 15.055 0 12 0 7.273 0 3.218 2.7 1.227 6.627l4.039 3.138z"/>
                <path fill="#4285F4" d="M23.755 12.218c0-.79-.073-1.554-.205-2.29H12v4.545h6.6c-.286 1.487-1.127 2.746-2.396 3.596l3.723 2.887c2.182-2.009 3.428-4.973 3.428-8.738z"/>
                <path fill="#FBBC05" d="M5.266 14.235A7.014 7.014 0 0 1 4.491 12c0-.79.131-1.555.357-2.265L1.227 6.627A11.93 11.93 0 0 0 0 12c0 1.927.455 3.755 1.255 5.391l4.011-3.156z"/>
                <path fill="#34A853" d="M12 24c3.245 0 5.973-1.082 7.964-2.927l-3.723-2.887c-1.032.691-2.35.105-3.92.105-3.18 0-5.882-2.145-6.845-5.045L1.436 16.4C3.418 21.3 8.29 24 12 24z"/>
            </svg>
            Google से लॉगिन करें
        </button>

        <div class="or-divider">या मोबाइल से लॉगिन करें</div>
        
        <div class="input-group">
            <i class="fas fa-phone-alt"></i>
            <input type="tel" id="login-phone" placeholder="मोबाइल नंबर दर्ज करें">
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="login-pass" placeholder="पासवर्ड दर्ज करें">
        </div>
        
        <button class="btn-primary" onclick="checkMobileLogin()">साइन इन करें</button>
        <p class="switch-text">नया अकाउंट बनाना है? <span onclick="goToSignUp()">रजिस्ट्रेशन करें</span></p>
    </div>

    <div id="g-sheet-overlay" class="g-sheet-overlay">
        <div class="g-sheet">
            <div id="g-email-section">
                <div class="g-sheet-title">
                    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.7 12.2c0-.8-.1-1.5-.2-2.3H12v4.5h6.6c-.3 1.5-1.1 2.7-2.4 3.6l3.7 2.9c2.2-2 3.4-5 3.4-8.7z"/><path fill="#34A853" d="M12 24c3.2 0 6-1.1 8-2.9l-3.7-2.9c-1 .7-2.4 1.1-4.3 1.1-3.2 0-5.9-2.1-6.8-5.1L1.4 16.4C3.4 21.3 8.3 24 12 24z"/><path fill="#FBBC05" d="M5.2 14.2c-.2-.7-.3-1.4-.3-2.2s.1-1.5.3-2.2L1.2 6.6C.4 8.2 0 10.1 0 12s.4 3.8 1.2 5.4l4-3.2z"/><path fill="#EA4335" d="M12 4.9c1.7 0 3.2.6 4.4 1.6l3.3-3.3C17.7 1.1 15 0 12 0 7.3 0 3.2 2.7 1.2 6.6l4 3.2c1-2.9 3.7-4.9 6.8-4.9z"/></svg>
                    Google एकाउंट से जारी रखें
                </div>
                <p style="font-size: 13px; color: #5f6368; margin-bottom: 12px;">Axcel Classes में सुरक्षित लॉगिन के लिए अपनी ईमेल डालें:</p>
                <input type="email" id="g-real-email" class="g-input" placeholder="example@gmail.com" required>
                <button class="g-sheet-btn" onclick="sendEmailOTP()">ओटीपी (OTP) भेजें</button>
            </div>

            <div id="g-otp-section" class="g-otp-section">
                <div class="g-sheet-title" style="color: #1a73e8;">
                    <i class="fas fa-envelope-open-text" style="font-size: 18px;"></i>
                    ईमेल सत्यापन कोड (OTP)
                </div>
                <p id="otp-message" style="font-size: 13px; color: #5f6368; margin-bottom: 15px;"></p>
                <input type="tel" id="g-otp-value" class="g-otp-input" maxlength="4" placeholder="0000">
                <button class="g-sheet-btn" style="background: #34A853;" onclick="verifyEmailOTP()">कंटिन्यू करें (Continue)</button>
            </div>
        </div>
    </div>

    <script>
        let generatedEmailOTP = null;
        let userEmailInput = "";

        function openGoogleSheet() {
            // हर बार नया खोलने पर ईमेल सेक्शन दिखे और ओटीपी छुपा रहे
            document.getElementById('g-email-section').style.display = 'block';
            document.getElementById('g-otp-section').style.display = 'none';
            document.getElementById('g-sheet-overlay').style.display = 'flex';
        }

        function sendEmailOTP() {
            userEmailInput = document.getElementById('g-real-email').value;
            if(!userEmailInput.includes('@') || userEmailInput.length < 5) {
                alert('कृपया एक सही जीमेल आईडी डालें!');
                return;
            }

            // रैंडम ४ डिजिट का लॉगिन ओटीपी जनरेट करना
            generatedEmailOTP = Math.floor(1000 + Math.random() * 9000).toString();
            
            // रियल ऐप टेस्टिंग जैसा सिस्टम अलर्ट पॉपअप
            alert(`Google Verification: आपकी ईमेल सुरक्षा का वेरिफिकेशन कोड है [ ${generatedEmailOTP} ]`);
            
            // ईमेल स्क्रीन छुपाकर ओटीपी स्क्रीन दिखाना
            document.getElementById('g-email-section').style.display = 'none';
            document.getElementById('g-otp-section').style.display = 'block';
            document.getElementById('otp-message').innerText = `हमने आपके गूगल अकाउंट ${userEmailInput} पर ४ अंकों का कोड भेजा है।`;
        }

        function verifyEmailOTP() {
            const typedOTP = document.getElementById('g-otp-value').value;

            if (typedOTP === generatedEmailOTP) {
                // सफल होने पर डेटा को हमेशा के लिए मोबाइल में सेव करना
                const googleUser = {
                    name: userEmailInput.split('@')[0], // ईमेल का पहला हिस्सा नाम बन जाएगा
                    phone: "GoogleAccount",
                    userClass: "Skill Based Course",
                    isLoggedIn: true
                };
                localStorage.setItem('axcel_user_session', JSON.stringify(googleUser));
                document.getElementById('g-sheet-overlay').style.display = 'none';

                alert('गूगल अकाउंट सफलतापूर्वक सिंक हो गया!');
                if (window.parent && window.parent.onModuleComplete) {
                    window.parent.onModuleComplete('login-success');
                }
            } else {
                alert('गलत ओटीपी कोड! कृपया दोबारा देखकर भरें।');
            }
        }

        function checkMobileLogin() {
            const phone = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;
            const savedProfile = localStorage.getItem('axcel_user_session');

            if (savedProfile) {
                const user = JSON.parse(savedProfile);
                if (user.phone === phone && user.pass === pass) {
                    user.isLoggedIn = true;
                    localStorage.setItem('axcel_user_session', JSON.stringify(user));
                    if (window.parent && window.parent.onModuleComplete) {
                        window.parent.onModuleComplete('login-success');
                    }
                    return;
                }
            }
            alert('गलत मोबाइल नंबर या पासवर्ड!');
        }

        function goToSignUp() {
            if (window.parent && window.parent.changeScreen) {
                window.parent.changeScreen('profile.html');
            }
        }
    </script>
</body>
</html>
